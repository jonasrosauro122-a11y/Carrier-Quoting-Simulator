<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Carrier Portal Simulator - Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #005A9C; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #004080; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Agent Portal Login</h2>
        <input type="text" id="agentId" placeholder="Agent ID (e.g., VA-123)" required>
        <input type="password" placeholder="Password" required>
        <button onclick="login()">Login</button>
    </div>
    <script>
        function login() {
            // Simple redirect for the simulator
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
