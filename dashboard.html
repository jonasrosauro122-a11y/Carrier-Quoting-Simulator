<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Carrier Simulator</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; }
        header { background-color: #005A9C; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 20px; max-width: 1000px; margin: auto; }
        .actions { margin-bottom: 20px; }
        .btn { background-color: #28a745; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px; border: none; cursor: pointer; }
        .btn-blue { background-color: #005A9C; }
        .btn-danger { background-color: #dc3545; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <header>
        <h2>Agent Dashboard</h2>
        <a href="index.html" style="color: white;">Logout</a>
    </header>
    <div class="container">
        <div class="actions">
            <a href="quote-form.html" class="btn btn-blue">Start New Auto/Home Quote</a>
        </div>
        <h3>Saved Drafts & Quotes</h3>
        <table id="draftTable">
            <thead>
                <tr>
                    <th>Client Name</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script src="app.js"></script>
    <script>
        window.onload = loadDashboard;
    </script>
</body>
</html>
