<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quote Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; }
        header { background-color: #005A9C; color: white; padding: 15px 20px; }
        .container { padding: 20px; max-width: 800px; margin: auto; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 20px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 10px 15px; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-save { background-color: #ffc107; color: black; }
        .btn-issue { background-color: #28a745; }
        .btn-back { background-color: #6c757d; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <header>
        <h2>Quote Engine Simulator</h2>
    </header>
    <div class="container">
        <div class="form-group">
            <label>Quote Type</label>
            <select id="quoteType">
                <option value="Auto">Auto Insurance</option>
                <option value="Home">Homeowners Insurance</option>
            </select>
        </div>
        <div class="form-group">
            <label>Client Full Name</label>
            <input type="text" id="clientName" placeholder="e.g. John Doe">
        </div>
        <div class="form-group">
            <label>Risk Address</label>
            <input type="text" id="address" placeholder="123 Main St">
        </div>
        <div class="form-group">
            <label>Scenario Detail (Vehicles/Roof Age/Prior Claims)</label>
            <input type="text" id="details" placeholder="Enter scenario details from training prompt...">
        </div>
        <div class="form-group">
            <label>Estimated Premium ($)</label>
            <input type="number" id="premium" placeholder="1200">
        </div>

        <div class="buttons">
            <a href="dashboard.html" class="btn btn-back">Back to Dashboard</a>
            <button class="btn btn-save" onclick="saveDraft()">Save as Draft</button>
            <button class="btn btn-issue" onclick="generateQuotePDF()">Issue Quote (Generate PDF)</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Load draft data if editing
        window.onload = loadFormData;
    </script>
</body>
</html>
